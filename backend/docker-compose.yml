version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: volshape_db
    restart: always
    environment:
      POSTGRES_DB: volshape
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpassword123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: volshape_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
