server {
    listen 80;
    server_name volshape.candlepower.cool;

    client_max_body_size 80m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name volshape.candlepower.cool;

    ssl_certificate /etc/letsencrypt/live/volshape.candlepower.cool/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/volshape.candlepower.cool/privkey.pem;

    client_max_body_size 80m;

    location / {
        root /var/www/volshape;
        try_files $uri $uri/ /index.html;
    }

    location /downloads/ {
        alias /var/www/volshape-downloads/;
        add_header Content-Disposition "attachment";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
